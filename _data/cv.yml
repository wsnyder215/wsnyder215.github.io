    Research:
      - company: Hope College, Dept. of Mathematics and Statistics
        position: Undergraduate Researcher — Survival Analysis of Long-Term Seed Viability
        location: Holland, Michigan
        start_date: 2025-04
        end_date: 2026-05
        url: https://github.com/wsnyder215/seed-viability-survival
        highlights:
          - >
            Modeled seed viability over a 30-year field experiment across 6 species
            using parametric, semiparametric, and nonparametric survival models fit
            to interval-censored germination data.
          - >
            Derived and implemented a novel parametric survival model incorporating
            an initial viability parameter ν, improving fit significantly over standard
            exponential and Weibull models for multiple species.
          - >
            Computed closed-form Fisher information matrices and applied the Delta Method
            to generate simultaneous confidence bands; validated analytical derivatives
            numerically.
          - >
            Conducted 24 likelihood ratio tests across nested model pairs with Bonferroni
            correction to assess model complexity tradeoffs.
        advisors:
          - Dr. Brian Yurk
          - Dr. Yew Meng Koh

    Projects:
      - name: LLM Personality Stability Experiment
        tools: "Lane Graph, Gemini Code Assist, Claude Sonnet"
        url: https://github.com/wsnyder215/Personality-Stability-Experimental-Workflow
        start_date: 2026-03
        end_date: 2026-05
        highlights:
          - Developed experimental tool for testing stability of psychological measures in LLMs against prompt nudging.
          - >
            Implemented Lane Graph workflow for nudging and measuring specific personality
            traits in LLMs, resulting in an effective tool for altering and analyzing LLM
            personality across conversation turns.
          - Created flexible framework for experimentation, ensuring a variety of methodologies can be run with the tool.
          - Applied personality experimentation tool to analyze the effects of various prompts on LLM personality.

